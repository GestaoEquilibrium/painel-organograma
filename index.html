<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo — Grupo Equilibrium</title>
<style>
  :root{
    --deep:#14375A; --navy:#1F4E79; --teal:#2E75B6; --sky:#5B9BD5;
    --ice:#9DC3E6; --frost:#DEEBF7; --paper:#EEF4FB; --line:#9BB6D2;
    --ink:#1B2733; --muted:#5B6B7B; --white:#fff; --danger:#C0392B;
    --ok:#1E8E5A; --warn:#B7791F; --purple:#6C5CE7;
    --shadow:0 1px 2px rgba(20,55,90,.12),0 8px 22px rgba(20,55,90,.12);
    --shadow-lg:0 20px 50px rgba(20,55,90,.28);
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:"Calibri","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--paper);display:flex;flex-direction:column;height:100vh}

  /* ---------- top bar ---------- */
  button{font-family:inherit;cursor:pointer;border:0;border-radius:9px;font-size:13px}
  .bar{background:linear-gradient(180deg,#255A92,#14375A);color:#fff;padding:11px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.09);box-shadow:0 2px 12px rgba(20,55,90,.2);z-index:20}
  .bar svg{width:16px;height:16px;display:block}
  .logo{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#BEE0F5;flex-shrink:0}
  .logo svg{width:23px;height:23px}
  .brand{display:flex;flex-direction:column;line-height:1.12}
  .brand b{font-size:15.5px;font-weight:600;letter-spacing:.2px}
  .brand span{font-size:11px;color:#A9C6E6;font-weight:400}
  .divider{width:1px;height:28px;background:rgba(255,255,255,.16);flex-shrink:0}
  .doc-title{min-width:170px;max-width:260px;background:transparent;border:1px solid transparent;color:#fff;font-size:14px;font-weight:600;padding:8px 12px;border-radius:9px;transition:background .12s,border-color .12s}
  .doc-title:hover{background:rgba(255,255,255,.08)}
  .doc-title:focus{outline:0;background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.3)}
  .doc-title::placeholder{color:#bcd4ee}
  .rightgrp{margin-left:auto;display:flex;align-items:center;gap:11px}
  .seg{display:inline-flex;background:rgba(0,0,0,.16);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:3px;gap:2px}
  .seg-b{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:8px;background:transparent;color:#cfe0f2;font-size:13px;font-weight:600;transition:background .12s,color .12s}
  .seg-b:hover{color:#fff}
  .seg-b.on{background:#fff;color:var(--navy)}
  .acts{display:flex;align-items:center;gap:7px}
  .ab{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-weight:600}
  .ab:hover{background:rgba(255,255,255,.2)}
  .ab.primary{background:#fff;color:var(--navy);border-color:#fff}
  .ab.primary:hover{background:#e9f2fc}
  .ab.only{padding:9px;width:38px;justify-content:center;color:#dbe8f7}
  .ab.only:hover{color:#fff}

  /* ---------- view toolbar ---------- */
  .vbar{display:flex;align-items:center;gap:12px;padding:8px 20px;background:#fff;border-bottom:1px solid #e3ebf5;z-index:15}
  .vbar svg{width:15px;height:15px;display:block}
  .vseg{display:inline-flex;background:#eef3f9;border:1px solid #dbe6f2;border-radius:10px;padding:3px;gap:2px}
  .vseg-b{display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:8px;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600}
  .vseg-b:hover{color:var(--navy)}
  .vseg-b.on{background:#fff;color:var(--navy);box-shadow:0 1px 3px rgba(20,55,90,.12)}
  .vbar .vhint{font-size:11.5px;color:var(--muted)}
  .vbtn{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:9px;border:1px solid #d3e0ef;background:#fff;color:var(--navy);font-size:12.5px;font-weight:600}
  .vbtn:hover{background:var(--frost)}
  .vbtn svg{width:15px;height:15px}
  .typepick{display:flex;gap:9px}
  .tp{flex:1;display:flex;flex-direction:column;gap:2px;align-items:flex-start;padding:12px 13px;border-radius:11px;border:2px solid #dbe6f2;background:#fff;cursor:pointer;text-align:left}
  .tp:hover{border-color:var(--ice)}
  .tp.on{border-color:var(--teal);background:var(--frost)}
  .tp b{font-size:13.5px;color:var(--navy)}
  .tp span{font-size:11.5px;color:var(--muted)}

  /* ---------- canvas ---------- */
  .stage{position:relative;flex:1;overflow:hidden;background:radial-gradient(circle at 1px 1px,#d3e0f0 1px,transparent 0);background-size:28px 28px;cursor:grab}
  .node.flash{animation:flash 1.7s ease}
  .mod.flash-mod{animation:flashmod 1.7s ease}
  @keyframes flashmod{0%,100%{box-shadow:var(--shadow)}25%,55%{box-shadow:0 0 0 4px rgba(242,184,7,.55),var(--shadow)}}
  @keyframes flash{0%,100%{box-shadow:0 0 0 0 rgba(242,184,7,0)}25%,55%{box-shadow:0 0 0 5px rgba(242,184,7,.6)}}

  /* ---------- sheet (lista / unidade) ---------- */
  .sheet{position:absolute;inset:0;overflow:auto;padding:26px 30px 60px;display:none}
  .lcard{max-width:1000px;margin:0 auto 22px;background:#fff;border:1px solid #d3e0ef;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .lhead{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid #eef2f8;background:#fbfdff}
  .lhead .ic{width:26px;height:26px;border-radius:8px;background:var(--frost);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:15px}
  .lhead b{font-size:14px;color:var(--navy)}
  .lhead .tag{font-size:10px;color:var(--muted);background:#f1f5fa;border-radius:999px;padding:2px 8px;text-transform:uppercase;letter-spacing:.3px}
  .lbody{padding:12px 18px}
  .outline{list-style:none;margin:0;padding:0}
  .outline .osub{margin-left:16px;border-left:2px solid #e6eef7;padding-left:14px;margin-top:2px}
  .oi{display:flex;align-items:baseline;gap:10px;padding:6px 8px;border-radius:8px;cursor:pointer}
  .oi:hover{background:#f4f8fc}
  .oi .of{font-weight:700;font-size:13px;color:var(--navy)}
  .oi .on{font-size:12px;color:var(--muted)}
  .units{display:flex;gap:16px;flex-wrap:wrap;max-width:1120px;margin:0 auto;align-items:flex-start}
  .ucol{flex:1 1 220px;min-width:210px;background:#fff;border:1px solid #d3e0ef;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .uhead{background:var(--navy);color:#fff;padding:11px 15px;font-weight:700;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
  .uhead span{background:rgba(255,255,255,.22);border-radius:999px;padding:1px 9px;font-size:12px}
  .ulist{padding:10px}
  .ucard{padding:9px 12px;border-radius:9px;border:1px solid #eef2f8;margin-bottom:8px}
  .ucard:last-child{margin-bottom:0}
  .ucard b{display:block;font-size:13px;color:var(--ink)}
  .ucard span{font-size:11.5px;color:var(--muted)}
  .ucard.jump{cursor:pointer}
  .ucard.jump:hover{border-color:var(--teal);background:#f7fafd}
  .uempty{max-width:640px;margin:40px auto;text-align:center;color:var(--muted);font-size:13.5px;background:#fff;border:1px dashed #c4d3e5;border-radius:var(--r);padding:26px}
  .plink{color:var(--teal);cursor:pointer;font-weight:600}.plink:hover{text-decoration:underline}
  .reflink{color:var(--teal);cursor:pointer}.reflink:hover{text-decoration:underline}
  .stage.grabbing{cursor:grabbing}
  .world{position:absolute;top:0;left:0;transform-origin:0 0}

  .zoombar{position:absolute;right:16px;bottom:16px;z-index:8;display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #d3e0ef;border-radius:11px;padding:5px 8px;box-shadow:var(--shadow)}
  .zoombar button{width:30px;height:30px;background:var(--frost);color:var(--navy);font-size:17px;font-weight:700}
  .zoombar span{font-size:12px;color:var(--muted);min-width:40px;text-align:center}
  .hintbar{position:absolute;left:16px;bottom:16px;z-index:8;background:rgba(255,255,255,.9);border:1px solid #d3e0ef;border-radius:10px;padding:7px 12px;font-size:11.5px;color:var(--muted);max-width:52%}

  /* ---------- module cards ---------- */
  .mod{position:absolute;background:#fff;border:1px solid #d3e0ef;border-radius:var(--r);box-shadow:var(--shadow)}
  .mod.sel{border-color:#F2B807;box-shadow:0 0 0 3px rgba(242,184,7,.32),var(--shadow)}
  .mhead{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid #eef2f8;border-radius:var(--r) var(--r) 0 0;cursor:grab}
  .mhead .ic{width:26px;height:26px;border-radius:8px;background:var(--frost);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .mhead b{font-size:13px;color:var(--navy);white-space:nowrap}
  .mhead .tag{font-size:10px;color:var(--muted);background:#f1f5fa;border-radius:999px;padding:2px 8px;text-transform:uppercase;letter-spacing:.3px}
  .mhead .mm{margin-left:auto;display:flex;gap:4px}
  .mhead .mm button{width:26px;height:26px;background:transparent;color:var(--muted);font-size:15px;border-radius:7px}
  .mhead .mm button:hover{background:#f1f5fa;color:var(--navy)}
  .mbody{padding:16px 18px}

  /* ---------- tree ---------- */
  ul.tree,.tree ul{display:flex;justify-content:center;padding:0;margin:0;list-style:none}
  .tree ul{padding-top:20px;position:relative}
  .tree li{position:relative;padding:20px 8px 0;display:flex;flex-direction:column;align-items:center}
  .tree li::before,.tree li::after{content:'';position:absolute;top:0;right:50%;border-top:2px solid var(--line);width:50%;height:20px}
  .tree li::after{right:auto;left:50%;border-left:2px solid var(--line)}
  .tree li:only-child::before,.tree li:only-child::after{display:none}
  .tree li:first-child::before,.tree li:last-child::after{border:0}
  .tree li:last-child::before{border-right:2px solid var(--line);border-radius:0 6px 0 0}
  .tree li:first-child::after{border-radius:6px 0 0 0}
  .tree ul::before{content:'';position:absolute;top:0;left:50%;border-left:2px solid var(--line);width:0;height:20px}
  .node{position:relative;border-radius:11px;padding:8px 12px;min-width:112px;max-width:176px;text-align:center;border:2px solid transparent;cursor:pointer;transition:transform .1s}
  .node:hover{transform:translateY(-2px)}
  .node.sel{border-color:#F2B807;box-shadow:0 0 0 3px rgba(242,184,7,.34)}
  .node .r{font-weight:700;font-size:12.5px;line-height:1.18}
  .node .n{font-size:11px;margin-top:3px;line-height:1.16;opacity:.95}
  .node .n.empty{font-style:italic;opacity:.55}
  .node.custom .n{color:inherit;opacity:.85}
  .addkid{position:absolute;bottom:-10px;right:-10px;width:21px;height:21px;border-radius:6px;background:var(--teal);color:#fff;border:2px solid #fff;box-shadow:0 2px 6px rgba(20,55,90,.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;line-height:1;cursor:pointer;opacity:.55;transition:opacity .1s,transform .1s;padding:0;z-index:4}
  .node:hover .addkid{opacity:1}
  .addkid:hover{background:var(--navy);transform:scale(1.12)}
  .node.dragging{opacity:.35}
  .node.droptarget{outline:3px dashed #F2B807;outline-offset:3px}
  .dragghost{position:fixed;z-index:70;background:var(--deep);color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;box-shadow:var(--shadow-lg);pointer-events:none;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lv0{background:var(--deep);color:#fff}.lv1{background:var(--navy);color:#fff}.lv2{background:var(--teal);color:#fff}
  .lv3{background:var(--sky);color:#fff}.lv4{background:var(--ice);color:var(--deep)}.lv5{background:var(--frost);color:var(--deep)}
  .lv0 .n,.lv1 .n,.lv2 .n,.lv3 .n{color:#e6f0fb}

  /* ---------- table ---------- */
  table.tbl{border-collapse:collapse;font-size:12.5px;min-width:340px}
  table.tbl th{text-align:left;color:var(--navy);font-weight:700;padding:8px 13px;border-bottom:2px solid var(--frost);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.3px;cursor:default}
  table.tbl th.editable{cursor:pointer}
  table.tbl th.editable:hover{background:#f7fafd}
  table.tbl td{padding:9px 13px;border-bottom:1px solid #f0f4f9;white-space:nowrap;cursor:pointer}
  table.tbl tr:hover td{background:#f7fafd}
  table.tbl td.emptyc{color:#b3c0cf;font-style:italic}
  .selo{font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;display:inline-block}
  .sv-verde{background:#e7f6ee;color:var(--ok)}.sv-ambar{background:#fff5e6;color:var(--warn)}
  .sv-vermelho{background:#fdecea;color:var(--danger)}.sv-azul{background:#e6f1fb;color:var(--navy)}.sv-cinza{background:#eef1f5;color:var(--muted)}
  .link-c{color:var(--teal);text-decoration:none}.link-c:hover{text-decoration:underline}
  .tadd{display:flex;gap:8px;padding:11px 13px 3px}
  .tadd button{font-size:12px;padding:7px 12px;border-radius:9px;background:var(--frost);color:var(--navy);font-weight:600}
  .tadd button:hover{background:#cfe1f5}
  .tempty{padding:22px 14px;text-align:center;color:var(--muted);font-size:12.5px}

  /* ---------- ghost / add ---------- */
  .ghost{position:absolute;width:210px;height:140px;border:2px dashed #b9cbe0;border-radius:var(--r);background:rgba(255,255,255,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);cursor:pointer}
  .ghost:hover{border-color:var(--teal);color:var(--teal);background:#fff}
  .ghost .p{font-size:30px;line-height:1}.ghost small{font-size:12px;font-weight:600}

  /* ---------- tooltip ---------- */
  .tip{position:absolute;z-index:30;background:var(--deep);color:#fff;border-radius:10px;padding:8px 12px;font-size:11.5px;max-width:230px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:var(--shadow-lg)}
  .tip b{display:block;font-size:12.5px;margin-bottom:2px}.tip span{color:#bcd4ee}

  /* ---------- right panel ---------- */
  .panel{position:absolute;top:0;right:0;height:100%;width:330px;background:#fff;box-shadow:-8px 0 24px rgba(20,55,90,.16);transform:translateX(100%);transition:transform .18s ease;z-index:25;display:flex;flex-direction:column}
  .panel.open{transform:translateX(0)}
  .panel header{background:var(--navy);color:#fff;padding:15px 18px;display:flex;justify-content:space-between;align-items:center}
  .panel header b{font-size:15px}
  .panel .close{background:transparent;color:#fff;font-size:20px;width:28px;height:28px}
  .panel .pbody{padding:18px;overflow:auto;flex:1}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1.5px solid #cdd9e8;border-radius:9px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff}
  .field textarea{min-height:74px;resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
  .field .chk{display:flex;align-items:center;gap:9px}
  .field .chk input{width:auto}
  .swatches{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px}
  .swatch{width:27px;height:27px;border-radius:7px;border:2px solid #fff;box-shadow:0 0 0 1px #d3e0ef;cursor:pointer;padding:0}
  .swatch.on{border-color:#F2B807;box-shadow:0 0 0 2px rgba(242,184,7,.45)}
  .swatch.reset{background:#fff;border:1.5px dashed #b9cbe0;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:none}
  .swatch.reset.on{border-color:#F2B807}
  .swatch.pick{-webkit-appearance:none;-moz-appearance:none;appearance:none;background:conic-gradient(from 0deg,#f43f5e,#f59e0b,#eab308,#10b981,#3b82f6,#8b5cf6,#f43f5e);box-shadow:0 0 0 1px #d3e0ef}
  .swatch.pick.on{border-color:#F2B807;box-shadow:0 0 0 2px rgba(242,184,7,.45)}
  .swatch.pick::-webkit-color-swatch-wrapper{padding:0}
  .swatch.pick::-webkit-color-swatch{border:0;border-radius:5px;opacity:0}
  .swatch.pick::-moz-color-swatch{border:0;opacity:0}
  .swatch.pick::-moz-focus-inner{border:0;padding:0}
  .chk.mini{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);cursor:pointer}
  .chk.mini input{width:auto}
  .grp .lbl{font-size:11.5px;font-weight:700;color:var(--muted);margin:6px 0 8px;text-transform:uppercase;letter-spacing:.4px}
  .pbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pbtn{padding:10px;background:var(--frost);color:var(--navy);font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px}
  .pbtn:hover{background:#cfe1f5}
  .pbtn.wide{grid-column:1/3}
  .pbtn.del{background:#fdecea;color:var(--danger)}.pbtn.del:hover{background:#f9d7d2}
  .pbtn.save{background:var(--navy);color:#fff}.pbtn.save:hover{background:var(--deep)}
  .pbtn:disabled{opacity:.4;cursor:not-allowed}

  /* ---------- modal ---------- */
  .overlay{position:absolute;inset:0;background:rgba(20,55,90,.42);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
  .overlay.open{display:flex}
  .modal{width:360px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg)}
  .modal .mh{background:var(--navy);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start}
  .modal .mh b{font-size:16px}.modal .mh small{font-size:11.5px;color:#bcd4ee;display:block;margin-top:2px}
  .modal .mh .x{background:transparent;border:0;color:#fff;font-size:21px;cursor:pointer;line-height:1}
  .modal .mbd{padding:16px 20px;max-height:52vh;overflow:auto}
  .modal.wide{width:420px}
  .mfoot{display:flex;gap:8px;padding:13px 20px;background:#f7fafd;border-top:1px solid #eef2f8}
  .mbtn{flex:1;font-size:13px;padding:11px;border-radius:9px;border:1px solid var(--navy);background:var(--navy);color:#fff;font-weight:600}
  .mbtn:hover{background:var(--deep)}
  .mbtn.del{flex:0 0 auto;padding:11px 16px;background:#fdecea;color:var(--danger);border-color:#f3c7c0}
  .mbtn.del:hover{background:#f9d7d2}
  .mbtn.ghost{background:#fff;color:var(--navy);border-color:#cdd9e8}
  .mbtn.ghost:hover{background:var(--frost)}

  /* ---------- abas do editor ---------- */
  .mtabs{display:flex;gap:4px;padding:10px 18px 0;background:#fff;border-bottom:1px solid #eef2f8;position:sticky;top:0;z-index:2}
  .mtab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);border:0;background:transparent;border-bottom:2px solid transparent;cursor:pointer}
  .mtab:hover{color:var(--navy)}
  .mtab.on{color:var(--navy);border-bottom-color:var(--teal)}
  .tabpane{display:none}
  .tabpane.on{display:block}
  .photoctl{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .photoprev{width:68px;height:68px;border-radius:50%;background:var(--frost);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:22px;font-weight:700;border:2px solid #dbe6f2;flex-shrink:0}
  .photoprev img{width:100%;height:100%;object-fit:cover}
  .photobtns{display:flex;flex-direction:column;gap:6px}
  .photobtns button{font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid #cdd9e8;background:#fff;color:var(--navy);font-weight:600;cursor:pointer}
  .photobtns button:hover{background:var(--frost)}
  .photobtns button.rm{color:var(--danger);border-color:#f3c7c0}

  /* ---------- dossiê (card) ---------- */
  .modal.dossie{width:490px}
  .dshead{padding:20px 22px;display:flex;gap:16px;align-items:center;position:relative;color:#fff;background:linear-gradient(135deg,var(--navy),var(--deep))}
  .dsavatar{width:78px;height:78px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.55);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:27px;font-weight:700;color:#fff}
  .dsavatar img{width:100%;height:100%;object-fit:cover}

/* ---------- nuvem (Supabase REST) ---------- */
function chdr(extra){ return Object.assign({apikey:CLOUD.key,Authorization:"Bearer "+CLOUD.key,"Content-Type":"application/json"},extra||{}); }

/* ---------- tempo real (polling leve) ---------- */
function canApplyRemote(){ return !document.getElementById("overlay").classList.contains("open") && !dirtyPending && !noderag && !modrag; }
async function poll(){
  if(!cloudReady()||document.hidden) return;
  try{
    const stamp=await cloudStamp();
    if(stamp && stamp!==lastStamp){
      if(canApplyRemote()){
        const row=await cloudLoad();
        if(row&&row.data){ ws=row.data; lastStamp=row.updated_at; sel=null; try{localStorage.setItem(LKEY,JSON.stringify(ws));}catch(e){} render(); setStatus("live"); toast("Painel atualizado por outra pessoa"); }
      }
    } else if(document.getElementById("statusPill").classList.contains("offline")){ setStatus("ok"); }
  }catch(e){ setStatus("offline"); }
}
function startPolling(){ if(pollT)clearInterval(pollT); if(cloudReady())pollT=setInterval(poll,4000); }
document.addEventListener("visibilitychange",()=>{ if(!document.hidden&&cloudReady())poll(); });

async function syncNow(){ if(!cloudReady()){ toast("Configure a nuvem no topo do arquivo (CLOUD.url e CLOUD.key)."); return; } setStatus("sync"); try{ const row=await cloudLoad(); if(row&&row.data){ ws=row.data; lastStamp=row.updated_at; sel=null; try{localStorage.setItem(LKEY,JSON.stringify(ws));}catch(e){} render(); closeModal(); } else { lastStamp=await cloudSave(); } setStatus("ok"); toast("Sincronizado"); }catch(e){ setStatus("offline"); toast("Não foi possível sincronizar."); } }
async function initCloud(){ if(!cloudReady()){ setStatus("local"); return; } setStatus("sync"); try{ const row=await cloudLoad(); if(row&&row.data){ ws=row.data; lastStamp=row.updated_at; needsAutolayout=false; try{localStorage.setItem(LKEY,JSON.stringify(ws));}catch(e){} render(); } else { lastStamp=await cloudSave(); } setStatus("ok"); }catch(e){ setStatus("offline"); } startPolling(); }

/* ---------- salvar (local + nuvem com debounce) ---------- */
function save(){ ws.meta.atualizado_em=new Date().toISOString(); try{localStorage.setItem(LKEY,JSON.stringify(ws));}catch(e){} if(!cloudReady())return; dirtyPending=true; setStatus("saving"); clearTimeout(saveT); saveT=setTimeout(async()=>{ try{ lastStamp=await cloudSave(); setStatus("ok"); }catch(e){ setStatus("offline"); } dirtyPending=false; },700); }
function editLocked(){ return cloudReady() && CLOUD.senha && !unlocked; }

/* ---------- lookups ---------- */
function getModule(id){ return ws.modulos.find(m=>m.id===id); }
function walk(node,fn,depth=0,parent=null){ fn(node,depth,parent); (node.filhos||[]).forEach(c=>walk(c,fn,depth+1,node)); }
function findOrgNode(mod,id){ let res=null; walk(mod.raiz,(n,d,p)=>{ if(n.id===id)res={node:n,parent:p}; }); return res; }
function personIndex(){ // id -> texto exibível (integrantes || função) — reatividade de exibição
  const idx={};
  ws.modulos.filter(m=>m.tipo==="organograma").forEach(m=>walk(m.raiz,n=>{ idx[n.id]=(n.integrantes||n.funcao); }));
  return idx;
}
function personOptions(){ const opts=[]; ws.modulos.filter(m=>m.tipo==="organograma").forEach(m=>walk(m.raiz,n=>{ opts.push({id:n.id,label:(n.integrantes?n.integrantes+" — ":"")+n.funcao}); })); return opts; }

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  document.getElementById("docTitle").value=ws.meta.titulo;
  document.querySelectorAll(".vseg-b").forEach(b=>b.classList.toggle("on",b.dataset.view===view));
  const isMap=view==="mapa";
  document.getElementById("world").style.display=isMap?"block":"none";
  document.getElementById("sheet").style.display=isMap?"none":"block";
  document.querySelector(".zoombar").style.display=isMap?"flex":"none";
  document.getElementById("hintbar").style.display=isMap?"block":"none";
  stage.style.cursor=isMap?"grab":"default";
  document.getElementById("btnArrumar").style.display=isMap?"inline-flex":"none";
  document.getElementById("vhint").textContent = isMap?"":(view==="lista"?"Panorama linear — bom para leitura e impressão":"Quem atua em cada unidade — clique num nome para localizá-lo no mapa");
  if(isMap) renderMap(); else renderSheet();
}
function renderMap(){
  const world=document.getElementById("world"); world.innerHTML="";
  ws.modulos.forEach(m=>world.appendChild(renderModule(m)));
  if(mode==="editar") world.appendChild(renderGhost());
  applyZoom();
  document.getElementById("hintbar").textContent = mode==="editar"
    ? "Edição · clique numa caixa para editar · use o + de cada caixa para adicionar um item abaixo · arraste uma caixa sobre outra para movê-la de lugar"
    : "Visualização · passe o mouse para o resumo, clique para os detalhes · arraste o cabeçalho para mover · arraste o fundo para navegar";
}

function renderModule(m){
  const el=document.createElement("div"); el.className="mod"+(sel&&sel.tipo==="module"&&sel.modId===m.id?" sel":"");
  el.style.left=m.pos.x+"px"; el.style.top=m.pos.y+"px"; el.dataset.mod=m.id;
  const icon = m.tipo==="organograma" ? "▤" : "☰";
  const head=document.createElement("div"); head.className="mhead"; head.dataset.handle="1";
  head.innerHTML='<div class="ic">'+icon+'</div><b>'+esc(m.nome)+'</b><span class="tag">'+(m.tipo==="organograma"?"organograma":"tabela")+'</span>';
  if(mode==="editar"){
    const mm=document.createElement("div"); mm.className="mm";
    mm.innerHTML='<button title="Renomear módulo" data-act="ren">✎</button><button title="Excluir módulo" data-act="delmod">🗑</button>';
    head.appendChild(mm);
  }
  el.appendChild(head);
  const body=document.createElement("div"); body.className="mbody";
  if(m.tipo==="organograma"){ const ul=document.createElement("ul"); ul.className="tree"; ul.appendChild(renderNode(m,m.raiz,0)); body.appendChild(ul); }
  else { body.appendChild(renderTable(m)); }

  return el;
}

function renderNode(mod,node,depth){
  const li=document.createElement("li");
  const card=document.createElement("div");
  const isSel=sel&&sel.tipo==="node"&&sel.nodeId===node.id;
  const custom=resolveColor(node.cor);
  card.className="node lv"+Math.min(depth,5)+(isSel?" sel":"")+(custom?" custom":"");
  if(custom){ card.style.background=custom.bg; card.style.color=custom.fg; }
  card.dataset.mod=mod.id; card.dataset.node=node.id;
  card.innerHTML='<div class="r">'+esc(node.funcao||"(sem função)")+'</div><div class="n'+(node.integrantes?"":" empty")+'">'+esc(node.integrantes||"— definir —")+'</div>'+(mode==="editar"?'<button class="addkid" title="Adicionar item aqui" onclick="event.stopPropagation();addChildTo(\''+mod.id+'\',\''+node.id+'\')">+</button>':"");
  li.appendChild(card);
  if(node.filhos&&node.filhos.length){ const ul=document.createElement("ul"); node.filhos.forEach(c=>ul.appendChild(renderNode(mod,c,depth+1))); li.appendChild(ul); }
  return li;
}

function renderTable(m){
  const wrap=document.createElement("div");
  if(mode==="editar"){
    const add=document.createElement("div"); add.className="tadd";
    add.innerHTML='<button data-act="addreg">＋ Registro</button><button data-act="addcol">＋ Coluna</button>';
    wrap.appendChild(add);
  }
  const t=document.createElement("table"); t.className="tbl"; t.dataset.mod=m.id;
  const thead=document.createElement("thead"); const trh=document.createElement("tr");
  m.colunas.forEach(c=>{ const th=document.createElement("th"); th.textContent=c.nome; if(mode==="editar"){th.className="editable";th.dataset.col=c.id;th.title="Editar coluna";} trh.appendChild(th); });
  thead.appendChild(trh); t.appendChild(thead);
  const tb=document.createElement("tbody");
  if(!m.registros.length){ const tr=document.createElement("tr"); const td=document.createElement("td"); td.colSpan=m.colunas.length; td.className="tempty"; td.textContent="Sem registros ainda."; tr.appendChild(td); tb.appendChild(tr); }
  m.registros.forEach(reg=>{
    const tr=document.createElement("tr"); tr.dataset.mod=m.id; tr.dataset.reg=reg.id;
    m.colunas.forEach(c=>{ const td=document.createElement("td"); const html=cellHTML(c,reg.valores[c.id]); if(html==="") {td.className="emptyc";td.textContent="—";} else td.innerHTML=html; tr.appendChild(td); });
    tb.appendChild(tr);
  });
  t.appendChild(tb); wrap.appendChild(t);
  return wrap;
}

/* ---------- formatação de célula ---------- */
function cellHTML(col,val){
  if(val==null||val==="") return col.tipo==="simnao" ? '<span class="selo sv-cinza">Não</span>' : "";
  switch(col.tipo){
    case "moeda": return "R$ "+Number(val).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
    case "porcentagem": return (Math.round(Number(val)*100)/100)+"%";
    case "numero": return esc(String(val));
    case "data": return val ? new Date(val+"T00:00:00").toLocaleDateString("pt-BR") : "";
    case "simnao": return '<span class="selo '+(val?"sv-verde":"sv-cinza")+'">'+(val?"Sim":"Não")+'</span>';
    case "selo": { const o=(col.opcoes||[]).find(o=>o.valor===val); return '<span class="selo sv-'+(o?o.cor:"cinza")+'">'+esc(val)+'</span>'; }
    case "link": return '<a class="link-c" href="'+esc(val)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">abrir ↗</a>';
    case "pessoa": { const idx=personIndex(); return '<span class="plink" data-person="'+esc(val)+'">'+esc(idx[val]||val)+' ↦</span>'; }
    default: return esc(String(val));
  }
}

function renderGhost(){
  const g=document.createElement("div"); g.className="ghost"; g.dataset.act="ghost";
  g.style.left="80px"; g.style.top=(moduleBottom()+50)+"px";
  g.innerHTML='<div class="p">＋</div><small>Novo módulo</small><small style="font-weight:400;opacity:.8">organograma · tabela</small>';
  return g;
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function moduleEl(id){ return document.querySelector('.mod[data-mod="'+id+'"]'); }
function moduleHeight(m){ const el=moduleEl(m.id); return el?el.offsetHeight:320; }
function moduleBottom(){ return Math.max(0,...ws.modulos.map(m=>m.pos.y+moduleHeight(m))); }
function autolayout(){ let y=60; ws.modulos.forEach(m=>{ m.pos.x=80; m.pos.y=y; y += moduleHeight(m)+90; }); save(); }

/* ---------- lookups de vínculo ---------- */
function orgOf(nodeId){ let id=null; ws.modulos.filter(m=>m.tipo==="organograma").forEach(m=>{ if(nodeId&&findOrgNode(m,nodeId))id=m.id; }); return id; }
function nodeReferences(nodeId){ const out=[]; ws.modulos.filter(m=>m.tipo==="tabela").forEach(m=>{ const pcols=m.colunas.filter(c=>c.tipo==="pessoa"); if(!pcols.length)return; m.registros.forEach(r=>{ pcols.forEach(pc=>{ if(r.valores[pc.id]===nodeId) out.push({modId:m.id,regId:r.id,mod:m.nome,titulo:r.valores[m.colunas[0].id]||"(registro)"}); }); }); }); return out; }

/* ---------- reatividade: focar caixa no mapa ---------- */
function focusNode(nodeId){
  const modId=orgOf(nodeId); if(!modId) return;
  view="mapa"; render();
  requestAnimationFrame(()=>{
    const el=document.querySelector('.node[data-node="'+nodeId+'"]'); if(!el)return;
    const st=stage.getBoundingClientRect(), r=el.getBoundingClientRect();
    tx += st.width/2 - (r.left-st.left+r.width/2);
    ty += st.height/2 - (r.top-st.top+r.height/2);
    applyZoom();
    el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1700);
  });
  closeModal();
}

/* ---------- sheet: lista ---------- */
function renderSheet(){
  const sheet=document.getElementById("sheet"); sheet.innerHTML="";
  if(view==="lista"){ ws.modulos.forEach(m=>sheet.appendChild(renderListBlock(m))); }
  else { sheet.appendChild(renderUnidade()); }
}
function renderListBlock(m){
  const card=document.createElement("div"); card.className="lcard";
  card.innerHTML='<div class="lhead"><div class="ic">'+(m.tipo==="organograma"?"▤":"☰")+'</div><b>'+esc(m.nome)+'</b><span class="tag">'+(m.tipo==="organograma"?"organograma":"tabela")+'</span></div>';
  const body=document.createElement("div"); body.className="lbody";
  if(m.tipo==="organograma"){ body.appendChild(outline(m.raiz,m.id)); }
  else { body.appendChild(renderTableRO(m)); }
  card.appendChild(body); return card;
}
function outline(node,modId){
  const ul=document.createElement("ul"); ul.className="outline";
  const li=document.createElement("li");
  li.innerHTML='<div class="oi" data-mod="'+modId+'" data-node="'+node.id+'"><span class="of">'+esc(node.funcao||"(sem função)")+'</span>'+(node.integrantes?'<span class="on">'+esc(node.integrantes)+'</span>':"")+'</div>';
  ul.appendChild(li);
  if(node.filhos&&node.filhos.length){ const sub=document.createElement("div"); sub.className="osub"; node.filhos.forEach(c=>sub.appendChild(outline(c,modId))); li.appendChild(sub); }

}
function renderTableRO(m){
  const t=document.createElement("table"); t.className="tbl";
  const thead=document.createElement("thead"), trh=document.createElement("tr");
  m.colunas.forEach(c=>{ const th=document.createElement("th"); th.textContent=c.nome; trh.appendChild(th); });
  thead.appendChild(trh); t.appendChild(thead);
  const tb=document.createElement("tbody");
  if(!m.registros.length){ const tr=document.createElement("tr"),td=document.createElement("td"); td.colSpan=m.colunas.length; td.className="tempty"; td.textContent="Sem registros."; tr.appendChild(td); tb.appendChild(tr); }
  m.registros.forEach(reg=>{ const tr=document.createElement("tr"); tr.dataset.mod=m.id; tr.dataset.reg=reg.id; m.colunas.forEach(c=>{ const td=document.createElement("td"); const h=cellHTML(c,reg.valores[c.id]); if(h===""){td.className="emptyc";td.textContent="—";} else td.innerHTML=h; tr.appendChild(td); }); tb.appendChild(tr); });
  t.appendChild(tb); return t;
}
/* ---------- sheet: por unidade ---------- */
function renderUnidade(){
  const wrap=document.createElement("div"); wrap.className="units";
  const groups={}; const push=(u,it)=>{ (groups[u]=groups[u]||[]).push(it); };
  ws.modulos.filter(m=>m.tipo==="organograma").forEach(m=>walk(m.raiz,n=>{ if(n.unidade&&n.integrantes) push(n.unidade,{label:n.integrantes,sub:n.funcao,node:n.id}); }));
  ws.modulos.filter(m=>m.tipo==="tabela").forEach(m=>{ const uc=m.colunas.find(c=>/unidade/i.test(c.nome)); if(!uc)return; const nc=m.colunas[0]; const pc=m.colunas.find(c=>c.tipo==="pessoa"); m.registros.forEach(r=>{ const u=r.valores[uc.id]; if(!u)return; push(u,{label:r.valores[nc.id]||"(sem nome)",sub:m.nome,node:pc?r.valores[pc.id]||null:null}); }); });
  const units=Object.keys(groups);
  if(!units.length){ wrap.innerHTML='<div class="uempty">Defina a <b>unidade</b> nas caixas do organograma, ou tenha uma coluna chamada "Unidade" numa tabela, para agrupar as pessoas aqui por unidade.</div>'; return wrap; }
  units.forEach(u=>{ const col=document.createElement("div"); col.className="ucol"; col.innerHTML='<div class="uhead">'+esc(u)+'<span>'+groups[u].length+'</span></div>'; const list=document.createElement("div"); list.className="ulist"; groups[u].forEach(it=>{ const c=document.createElement("div"); c.className="ucard"+(it.node?" jump":""); if(it.node)c.dataset.node=it.node; c.innerHTML='<b>'+esc(it.label)+'</b><span>'+esc(it.sub)+'</span>'; list.appendChild(c); }); col.appendChild(list); wrap.appendChild(col); });
  return wrap;
}

/* ============================================================
   ZOOM / PAN
   ============================================================ */
function applyZoom(){ document.getElementById("world").style.transform="translate("+tx+"px,"+ty+"px) scale("+zoom+")"; document.getElementById("zlbl").textContent=Math.round(zoom*100)+"%"; }
function zoomAt(dir,cx,cy){ const st=document.getElementById("stage").getBoundingClientRect(); cx=(cx==null?st.width/2:cx-st.left); cy=(cy==null?st.height/2:cy-st.top); const ns=Math.min(1.8,Math.max(.35,+(zoom*(dir>0?1.15:.87)).toFixed(3))); const wx=(cx-tx)/zoom, wy=(cy-ty)/zoom; tx=cx-wx*ns; ty=cy-wy*ns; zoom=ns; applyZoom(); hideTip(); }
function zoomBtn(d){ zoomAt(d); }

const stage=document.getElementById("stage");
stage.addEventListener("wheel",e=>{ if(view!=="mapa")return; e.preventDefault(); zoomAt(e.deltaY<0?1:-1,e.clientX,e.clientY); },{passive:false});

let pan=null, modrag=null, noderag=null, moved=false, suppress=false;
stage.addEventListener("mousedown",e=>{
  if(view!=="mapa") return;
  const handle=e.target.closest('[data-handle]');
  if(handle&&!e.target.closest(".mm")){ const modEl=handle.closest(".mod"); const m=getModule(modEl.dataset.mod);
    modrag={m,sx:e.clientX,sy:e.clientY,ox:m.pos.x,oy:m.pos.y,el:modEl}; moved=false; stage.classList.add("grabbing"); return; }
  const nodeEl=e.target.closest(".node");
  if(mode==="editar"&&nodeEl&&!e.target.closest(".addkid")){
    const r=findOrgNode(getModule(nodeEl.dataset.mod),nodeEl.dataset.node);
    if(r&&r.parent){ noderag={el:nodeEl,modId:nodeEl.dataset.mod,nodeId:nodeEl.dataset.node,sx:e.clientX,sy:e.clientY,active:false,target:null}; moved=false; return; }
  }
  if(nodeEl||e.target.closest(".mod")||e.target.closest(".ghost")) return;
  pan={sx:e.clientX,sy:e.clientY,ox:tx,oy:ty}; moved=false; stage.classList.add("grabbing"); hideTip();
});
window.addEventListener("mousemove",e=>{
  if(noderag){ const dx=e.clientX-noderag.sx, dy=e.clientY-noderag.sy; if(Math.abs(dx)+Math.abs(dy)>6){ moved=true; if(!noderag.active){ noderag.active=true; startNodeGhost(noderag); } updateNodeGhost(e); highlightDrop(e); } return; }
  if(modrag){ const dx=(e.clientX-modrag.sx)/zoom, dy=(e.clientY-modrag.sy)/zoom; if(Math.abs(dx)+Math.abs(dy)>2)moved=true; modrag.m.pos.x=Math.round(modrag.ox+dx); modrag.m.pos.y=Math.round(modrag.oy+dy); modrag.el.style.left=modrag.m.pos.x+"px"; modrag.el.style.top=modrag.m.pos.y+"px"; }
  else if(pan){ const dx=e.clientX-pan.sx, dy=e.clientY-pan.sy; if(Math.abs(dx)+Math.abs(dy)>2)moved=true; tx=pan.ox+dx; ty=pan.oy+dy; applyZoom(); }
});
window.addEventListener("mouseup",()=>{
  if(noderag){ document.querySelectorAll(".droptarget").forEach(n=>n.classList.remove("droptarget")); if(noderag.ghost)noderag.ghost.remove(); if(noderag.el)noderag.el.classList.remove("dragging");
    if(noderag.active){ if(noderag.target) moveNodeUnder(noderag.modId,noderag.nodeId,noderag.target.dataset.node); suppress=true; setTimeout(()=>suppress=false,0); }
    noderag=null; return; }
  if(modrag&&moved){ save(); } if(moved)suppress=true; setTimeout(()=>suppress=false,0); pan=null; modrag=null; stage.classList.remove("grabbing");
});
function startNodeGhost(nr){ const d=findOrgNode(getModule(nr.modId),nr.nodeId).node; const g=document.createElement("div"); g.className="dragghost"; g.textContent="↳ "+(d.funcao||"caixa"); document.body.appendChild(g); nr.ghost=g; if(nr.el)nr.el.classList.add("dragging"); }
function updateNodeGhost(e){ if(noderag&&noderag.ghost){ noderag.ghost.style.left=(e.clientX+13)+"px"; noderag.ghost.style.top=(e.clientY+13)+"px"; } }
function highlightDrop(e){ document.querySelectorAll(".droptarget").forEach(n=>n.classList.remove("droptarget")); const t=dropTargetAt(e); noderag.target=t; if(t)t.classList.add("droptarget"); }
function dropTargetAt(e){ if(noderag.ghost)noderag.ghost.style.display="none"; const el=document.elementFromPoint(e.clientX,e.clientY); if(noderag.ghost)noderag.ghost.style.display=""; const t=el&&el.closest(".node"); if(!t||t===noderag.el||t.dataset.mod!==noderag.modId)return null; if(isDescendant(noderag.modId,noderag.nodeId,t.dataset.node))return null; return t; }
function isDescendant(modId,ancestorId,maybeId){ const {node}=findOrgNode(getModule(modId),ancestorId); let found=false; walk(node,n=>{ if(n.id===maybeId&&n.id!==ancestorId)found=true; }); return found; }
function moveNodeUnder(modId,nodeId,targetId){ const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); const tr=findOrgNode(mod,targetId); if(!parent||!tr||node===tr.node)return; parent.filhos.splice(parent.filhos.indexOf(node),1); tr.node.filhos.push(node); save(); render(); toast('Movido para "'+(tr.node.funcao||"caixa")+'"'); }

/* ============================================================
   INTERAÇÕES (delegação de clique)
   ============================================================ */
document.getElementById("world").addEventListener("click",e=>{
  if(suppress) return;
  const ghost=e.target.closest(".ghost"); if(ghost){ novoModulo(); return; }
  const person=e.target.closest("[data-person]"); if(person){ focusNode(person.dataset.person); return; }
  const act=e.target.closest("[data-act]");
  if(mode==="editar"&&act){ handleAct(act.dataset.act,act); return; }
  const th=e.target.closest("th[data-col]"); if(mode==="editar"&&th){ const modEl=th.closest("[data-mod]"); openColumnPanel(modEl.dataset.mod,th.dataset.col); return; }
  const node=e.target.closest(".node"); if(node){ onSelectNode(node.dataset.mod,node.dataset.node); return; }
  const tr=e.target.closest("tr[data-reg]"); if(tr){ onSelectRecord(tr.dataset.mod,tr.dataset.reg); return; }
});

document.getElementById("sheet").addEventListener("click",e=>{
  const person=e.target.closest("[data-person]"); if(person){ focusNode(person.dataset.person); return; }
  const uc=e.target.closest(".ucard.jump"); if(uc){ focusNode(uc.dataset.node); return; }
  const oi=e.target.closest(".oi"); if(oi){ openNodeModal(oi.dataset.mod,oi.dataset.node); return; }
  const tr=e.target.closest("tr[data-reg]"); if(tr){ openRecordModal(tr.dataset.mod,tr.dataset.reg); return; }
});

function handleAct(act,el){
  const modEl=el.closest(".mod"); const modId=modEl?modEl.dataset.mod:null;
  if(act==="addreg") addRecord(modId);
  else if(act==="addcol") openColumnPanel(modId,null);
  else if(act==="ren") renameModule(modId);
  else if(act==="delmod") deleteModule(modId);
}

/* ---------- hover tooltip (org) ---------- */
const tip=document.getElementById("tip");
document.getElementById("world").addEventListener("mouseover",e=>{ const n=e.target.closest(".node"); if(!n)return; const r=findOrgNode(getModule(n.dataset.mod),n.dataset.node); if(!r)return; const d=r.node; tip.innerHTML='<b>'+esc(d.funcao)+'</b><span>'+esc(d.integrantes||"sem integrante definido")+(d.unidade?" · "+esc(d.unidade):"")+'</span>'; tip.style.opacity=1; });
document.getElementById("world").addEventListener("mousemove",e=>{ if(tip.style.opacity!=="1")return; const st=stage.getBoundingClientRect(); let x=e.clientX-st.left+14,y=e.clientY-st.top+14; tip.style.left=Math.min(x,st.width-240)+"px"; tip.style.top=Math.min(y,st.height-70)+"px"; });
document.getElementById("world").addEventListener("mouseout",e=>{ if(e.target.closest(".node"))hideTip(); });
function hideTip(){ tip.style.opacity=0; }

/* ---------- seleção ---------- */
function onSelectNode(modId,nodeId){ if(mode==="ver") openDossie(modId,nodeId); else openNodePanel(modId,nodeId); }
function onSelectRecord(modId,regId){ if(mode==="ver") openRecordModal(modId,regId); else openRecordPanel(modId,regId); }

/* ============================================================
   MODAIS (visualizar)
   ============================================================ */
const overlay=document.getElementById("overlay"), modalEl=document.getElementById("modal");
function closeModal(){ overlay.classList.remove("open"); modalEl.className="modal"; if(sel){ sel=null; render(); } }
function openEditModal(title,bodyHTML,footerHTML){ modalEl.className="modal wide"; modalEl.innerHTML='<div class="mh"><div><b>'+esc(title)+'</b></div><button class="x" onclick="closeModal()">×</button></div><div class="mbd edit">'+bodyHTML+'</div><div class="mfoot">'+footerHTML+'</div>'; overlay.classList.add("open"); }
function drow(k,v){ return '<div class="drow"><span class="k">'+esc(k)+'</span><span class="v">'+(v||"—")+'</span></div>'; }
function openNodeModal(modId,nodeId){
  const d=findOrgNode(getModule(modId),nodeId).node;
  const refs=nodeReferences(nodeId);
  const refHtml = refs.length ? '<div class="drow"><span class="k">Aparece em</span><span class="v">'+refs.map(x=>'<span class="reflink" onclick="openRecordModal(\''+x.modId+'\',\''+x.regId+'\')">'+esc(x.mod)+' → '+esc(x.titulo)+'</span>').join("<br>")+'</span></div>' : "";
  modalEl.className="modal";
  modalEl.innerHTML='<div class="mh"><div><b>'+esc(d.funcao)+'</b><small>'+esc(d.unidade||"Grupo Equilibrium")+'</small></div><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="mbd">'+drow("Integrante(s)",esc(d.integrantes))+(d.registro?drow("Registro",esc(d.registro)):"")+drow("Unidade",esc(d.unidade))+(d.descricao?drow("Descrição",esc(d.descricao)):"")+refHtml+'</div>';
  overlay.classList.add("open");
}
function openRecordModal(modId,regId){
  const m=getModule(modId); const reg=m.registros.find(r=>r.id===regId);
  let rows=""; m.colunas.forEach(c=>{ const h=cellHTML(c,reg.valores[c.id]); rows+=drow(c.nome,h||"—"); });
  const titulo = reg.valores[m.colunas[0].id] || m.nome;
  modalEl.className="modal";
  modalEl.innerHTML='<div class="mh"><div><b>'+esc(titulo)+'</b><small>'+esc(m.nome)+'</small></div><button class="x" onclick="closeModal()">×</button></div><div class="mbd">'+rows+'</div>';
  overlay.classList.add("open");
}

/* ---- dossiê (card de visualização) ---- */
function fmtDate(v){ if(!v)return ""; try{ return new Date(v+"T00:00:00").toLocaleDateString("pt-BR"); }catch(e){ return v; } }
function initials(s){ const p=String(s||"").trim().split(/\s+/).filter(Boolean); if(!p.length)return "•"; return (p[0][0]+(p.length>1?p[p.length-1][0]:"")).toUpperCase(); }
function dsicon(name){ const m={func:'<path d="M4 7h16M4 12h16M4 17h10"/>',user:'<circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/>',link:'<path d="M9.5 13.5a4 4 0 0 0 5.7 0l2-2a4 4 0 0 0-5.7-5.7l-1 1"/><path d="M14.5 10.5a4 4 0 0 0-5.7 0l-2 2a4 4 0 0 0 5.7 5.7l1-1"/>'}; return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(m[name]||"")+'</svg>'; }
function dsrow(k,v){ return '<div class="ds-row"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'; }
function dsblock(k,v){ return '<div class="ds-block"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div></div>'; }
function openDossie(modId,nodeId){
  const node=findOrgNode(getModule(modId),nodeId).node; const p=node.perfil||{};
  const nome=p.nomeCompleto||node.integrantes||node.funcao||"—";
  const cargo=p.cargo||node.funcao||"";
  const custom=resolveColor(node.cor);
  const headStyle=custom?'style="background:'+custom.bg+';color:'+custom.fg+'"':"";
  const avatar=p.foto?'<img src="'+p.foto+'" alt="">':esc(initials(p.nomeCompleto||node.integrantes||node.funcao));
  let badges=""; if(node.unidade)badges+='<span class="dsbadge">'+esc(node.unidade)+'</span>'; if(node.registro)badges+='<span class="dsbadge">'+esc(node.registro)+'</span>'; if(p.admissao)badges+='<span class="dsbadge">Desde '+esc(fmtDate(p.admissao))+'</span>';
  let func="";
  if(node.descricao)func+=dsblock("Descrição",node.descricao);
  if(node.responsabilidades)func+=dsblock("Responsabilidades",node.responsabilidades);
  if(node.competencias)func+=dsblock("Competências",node.competencias);
  if(node.cargaHoraria)func+=dsrow("Carga horária",node.cargaHoraria);
  if(!func)func='<div class="ds-empty">Sem detalhes da função ainda. Entre no modo Editar para preencher.</div>';
  let prof="";
  if(p.nomeCompleto&&p.nomeCompleto!==node.integrantes)prof+=dsrow("Nome completo",p.nomeCompleto);
  if(p.nascimento)prof+=dsrow("Nascimento",fmtDate(p.nascimento));
  if(p.email)prof+=dsrow("E-mail",p.email);
  if(p.telefone)prof+=dsrow("Telefone",p.telefone);
  if(p.endereco)prof+=dsrow("Endereço",p.endereco);
  if(p.admissao)prof+=dsrow("Admissão",fmtDate(p.admissao));
  if(p.formacao)prof+=dsblock("Formação acadêmica",p.formacao);
  if(p.observacoes)prof+=dsblock("Observações",p.observacoes);
  if(!prof)prof='<div class="ds-empty">Dados do profissional ainda não preenchidos. Entre no modo Editar e abra a aba “Dossiê profissional”.</div>';
  const refs=nodeReferences(nodeId);
  const refHtml = refs.length ? '<div class="dssec"><div class="ds-h">'+dsicon("link")+'Aparece em</div>'+refs.map(x=>'<div class="ds-row"><span class="v ds-ref" onclick="openRecordModal(\''+x.modId+'\',\''+x.regId+'\')">'+esc(x.mod)+" → "+esc(x.titulo)+'</span></div>').join("")+'</div>' : "";
  modalEl.className="modal dossie";
  modalEl.innerHTML=
    '<div class="dshead" '+headStyle+'><div class="dsavatar">'+avatar+'</div><div class="dsident"><b>'+esc(nome)+'</b><span class="dscargo">'+esc(cargo)+'</span><div class="dsbadges">'+badges+'</div></div><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="dsbody">'+
      '<div class="dssec"><div class="ds-h">'+dsicon("func")+'Função / cargo</div>'+func+'</div>'+
      '<div class="dssec"><div class="ds-h">'+dsicon("user")+'Profissional</div>'+prof+'</div>'+
      refHtml+
    '</div>';
  overlay.classList.add("open");
}

/* ============================================================
   POP-UP DE EDIÇÃO

function closePanel(){ closeModal(); }

/* ---- nó do organograma ---- */
function openNodePanel(modId,nodeId){
  sel={tipo:"node",modId,nodeId};
  const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); const p=node.perfil||{};
  const isRoot=!parent; const sibs=parent?parent.filhos:[mod.raiz]; const idx=sibs.indexOf(node);
  const funcTab=
    fld("Função / setor","node_funcao",node.funcao,"text","Ex.: Gerência Clínica")+
    fld("Integrante(s)","node_integrantes",node.integrantes,"text","Nome — em branco se indefinido")+
    fld("Unidade","node_unidade",node.unidade,"text","EQ1, EQ2, Institucional…")+
    fld("Registro (CRP/CRM)","node_registro",node.registro,"text","")+
    fldArea("Descrição","node_descricao",node.descricao,"O que este setor faz…")+
    fldArea("Responsabilidades","node_responsabilidades",node.responsabilidades,"Principais atribuições do cargo…")+
    fldArea("Competências","node_competencias",node.competencias,"Habilidades exigidas…")+
    fld("Carga horária","node_cargaHoraria",node.cargaHoraria,"text","Ex.: 40h semanais")+
    colorSwatches(node)+
    '<div class="grp"><div class="lbl">Estrutura</div><div class="pbtns">'+
      '<button class="pbtn wide" onclick="nodeAdd(\'child\')">＋ Subordinado</button>'+
      '<button class="pbtn" onclick="nodeAdd(\'sib\')" '+(isRoot?"disabled":"")+'>＋ Par</button>'+
      '<button class="pbtn" onclick="nodeDup()" '+(isRoot?"disabled":"")+'>⧉ Duplicar</button>'+
      '<button class="pbtn" onclick="nodeMove(-1)" '+(isRoot||idx<=0?"disabled":"")+'>← Mover</button>'+
      '<button class="pbtn" onclick="nodeMove(1)" '+(isRoot||idx>=sibs.length-1?"disabled":"")+'>Mover →</button>'+
      '<button class="pbtn del wide" onclick="nodeDel()" '+(isRoot?"disabled":"")+'>🗑 Excluir caixa</button>'+
    '</div></div>';
  const av=p.foto?'<img src="'+p.foto+'">':esc(initials(p.nomeCompleto||node.integrantes||node.funcao));
  const dossieTab=
    '<div class="photoctl"><div class="photoprev" id="perf_prev">'+av+'</div><div class="photobtns">'+
      '<button type="button" onclick="document.getElementById(\'perf_file\').click()">Escolher foto</button>'+
      '<button type="button" class="rm" onclick="removePhoto()">Remover</button></div>'+
      '<input type="file" id="perf_file" accept="image/*" style="display:none" onchange="onPhoto(event)"></div>'+
    fld("Nome completo","perf_nomeCompleto",p.nomeCompleto,"text","")+
    fld("Cargo","perf_cargo",p.cargo,"text","Ex.: Coordenadora Clínica")+
    fld("Nascimento","perf_nascimento",p.nascimento,"date","")+
    fld("E-mail","perf_email",p.email,"email","")+
    fld("Telefone","perf_telefone",p.telefone,"tel","")+
    fld("Endereço","perf_endereco",p.endereco,"text","")+
    fldArea("Formação acadêmica","perf_formacao",p.formacao,"Graduação, pós-graduação, especializações…")+
    fld("Admissão","perf_admissao",p.admissao,"date","")+
    fldArea("Observações gerais","perf_observacoes",p.observacoes,"");
  const body=
    '<div class="mtabs"><button class="mtab on" onclick="switchTab(0)">Função</button><button class="mtab" onclick="switchTab(1)">Dossiê profissional</button></div>'+
    '<div class="tabpane on" id="tabp0">'+funcTab+'</div>'+
    '<div class="tabpane" id="tabp1">'+dossieTab+'</div>';
  openEditModal("Editar caixa",body,'<button class="mbtn ghost" onclick="openDossie(\''+modId+'\',\''+nodeId+'\')">Ver dossiê</button><button class="mbtn" onclick="closeModal()">Concluir</button>');
  bindNodeFields(modId,nodeId); bindPerfilFields(modId,nodeId);
}
function switchTab(i){ modalEl.querySelectorAll(".mtab").forEach((b,j)=>b.classList.toggle("on",j===i)); modalEl.querySelectorAll(".tabpane").forEach(pane=>pane.classList.toggle("on",pane.id==="tabp"+i)); }
function bindPerfilFields(modId,nodeId){ const map={perf_nomeCompleto:"nomeCompleto",perf_cargo:"cargo",perf_nascimento:"nascimento",perf_email:"email",perf_telefone:"telefone",perf_endereco:"endereco",perf_formacao:"formacao",perf_admissao:"admissao",perf_observacoes:"observacoes"}; Object.keys(map).forEach(fid=>{ const el=document.getElementById(fid); if(!el)return; el.oninput=()=>{ const {node}=findOrgNode(getModule(modId),nodeId); (node.perfil||(node.perfil={}))[map[fid]]=el.value; save(); }; }); }
function readPhoto(file,cb){ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=380; let w=img.width,h=img.height; const s=Math.min(1,max/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s); const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h); cb(c.toDataURL("image/jpeg",0.82)); }; img.src=r.result; }; r.readAsDataURL(file); }
function onPhoto(ev){ const f=ev.target.files&&ev.target.files[0]; if(!f||!sel)return; readPhoto(f,data=>{ const {node}=findOrgNode(getModule(sel.modId),sel.nodeId); (node.perfil||(node.perfil={})).foto=data; save(); const prev=document.getElementById("perf_prev"); if(prev)prev.innerHTML='<img src="'+data+'">'; }); ev.target.value=""; }
function removePhoto(){ if(!sel)return; const {node}=findOrgNode(getModule(sel.modId),sel.nodeId); if(node.perfil)delete node.perfil.foto; save(); const prev=document.getElementById("perf_prev"); if(prev)prev.textContent=initials((node.perfil&&node.perfil.nomeCompleto)||node.integrantes||node.funcao); }
function colorSwatches(node){
  const isHex=node.cor&&/^#/.test(node.cor);
  let s='<button class="swatch reset'+(node.cor?"":" on")+'" data-cor="padrao" title="Padrão (cor do nível)" onclick="setNodeColor(\'padrao\')">↺</button>';
  Object.keys(NODE_CORES).forEach(k=>{ const c=NODE_CORES[k]; s+='<button class="swatch'+(node.cor===k?" on":"")+'" data-cor="'+k+'" style="background:'+c.bg+'" title="'+c.label+'" onclick="setNodeColor(\''+k+'\')"></button>'; });
  s+='<input type="color" id="corCustom" class="swatch pick'+(isHex?" on":"")+'" title="Escolher na paleta completa" value="'+(isHex?node.cor:"#2E75B6")+'" oninput="setNodeColor(this.value)">';
  return '<div class="grp"><div class="lbl">Cor da caixa</div><div class="swatches">'+s+'</div>'+
    '<label class="chk mini"><input type="checkbox" id="corRamo"><span>Aplicar aos subordinados</span></label></div>';
}
function refreshSwatchState(cor){
  document.querySelectorAll(".swatch[data-cor]").forEach(sw=>sw.classList.toggle("on",sw.dataset.cor===(cor||"padrao")));
  const well=document.getElementById("corCustom"); if(well){ const isHex=cor&&/^#/.test(cor); well.classList.toggle("on",!!isHex); if(isHex)well.value=cor; }
}
function setNodeColor(value){
  if(!sel||sel.tipo!=="node")return;
  const {node}=findOrgNode(getModule(sel.modId),sel.nodeId);
  const ramo=document.getElementById("corRamo")&&document.getElementById("corRamo").checked;
  const apply=n=>{ if(value==="padrao")delete n.cor; else n.cor=value; };
  apply(node); if(ramo)walk(node,n=>{ if(n!==node)apply(n); });
  save(); render(); refreshSwatchState(node.cor);
}
function addChildTo(modId,nodeId){ sel={tipo:"node",modId,nodeId}; nodeAdd("child"); }
function bindNodeFields(modId,nodeId){
  const map={node_funcao:"funcao",node_integrantes:"integrantes",node_unidade:"unidade",node_registro:"registro",node_descricao:"descricao",node_responsabilidades:"responsabilidades",node_competencias:"competencias",node_cargaHoraria:"cargaHoraria"};
  Object.keys(map).forEach(fid=>{ const el=document.getElementById(fid); if(!el)return; el.oninput=()=>{ const node=findOrgNode(getModule(modId),nodeId).node; node[map[fid]]=el.value; save(); const card=document.querySelector('.node[data-node="'+nodeId+'"]'); if(card){ if(map[fid]==="funcao")card.querySelector(".r").textContent=el.value||"(sem função)"; if(map[fid]==="integrantes"){const nn=card.querySelector(".n");nn.textContent=el.value||"— definir —";nn.className="n"+(el.value?"":" empty");} } }; });
}
function nodeAdd(kind){ const {modId,nodeId}=sel; const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); const c={id:uid(),funcao:"Nova função",integrantes:"",unidade:"",registro:"",descricao:"",filhos:[]}; if(kind==="child"){ node.filhos.push(c); } else { if(!parent)return; parent.filhos.splice(parent.filhos.indexOf(node)+1,0,c); } save(); sel={tipo:"node",modId,nodeId:c.id}; render(); openNodePanel(modId,c.id); toast(kind==="child"?"Subordinado adicionado":"Par adicionado"); }
function nodeDup(){ const {modId,nodeId}=sel; const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); if(!parent)return; const cl=JSON.parse(JSON.stringify(node)); (function r(x){x.id=uid();(x.filhos||[]).forEach(r);})(cl); parent.filhos.splice(parent.filhos.indexOf(node)+1,0,cl); save(); sel={tipo:"node",modId,nodeId:cl.id}; render(); openNodePanel(modId,cl.id); toast("Caixa duplicada"); }
function nodeMove(dir){ const {modId,nodeId}=sel; const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); if(!parent)return; const i=parent.filhos.indexOf(node),j=i+dir; if(j<0||j>=parent.filhos.length)return; parent.filhos.splice(i,1); parent.filhos.splice(j,0,node); save(); render(); openNodePanel(modId,nodeId); }
function nodeDel(){ const {modId,nodeId}=sel; const mod=getModule(modId); const {node,parent}=findOrgNode(mod,nodeId); if(!parent)return; if(!confirm('Excluir "'+node.funcao+'"'+(node.filhos.length?" e todos os subordinados?":"?")))return; parent.filhos.splice(parent.filhos.indexOf(node),1); save(); closePanel(); toast("Caixa excluída"); }

/* ---- registro de tabela ---- */
function openRecordPanel(modId,regId){
  sel={tipo:"record",modId,regId};
  const m=getModule(modId); const reg=m.registros.find(r=>r.id===regId);
  let body=""; m.colunas.forEach(c=>{ body+=recordField(c,reg.valores[c.id]); });
  openEditModal("Editar registro",body,'<button class="mbtn del" onclick="recordDel()">🗑 Excluir</button><button class="mbtn" onclick="closeModal()">Concluir</button>');
  m.colunas.forEach(c=>{ const el=document.getElementById("rf_"+c.id); if(!el)return; const handler=()=>{ let v = c.tipo==="simnao"?el.checked : el.value; reg.valores[c.id]=v; save(); updateCell(modId,regId,c.id); }; if(c.tipo==="simnao")el.onchange=handler; else el.oninput=handler; });
}
function recordField(c,val){
  const id="rf_"+c.id;
  if(c.tipo==="textolongo") return '<div class="field"><label>'+esc(c.nome)+'</label><textarea id="'+id+'">'+esc(val||"")+'</textarea></div>';
  if(c.tipo==="selecao"||c.tipo==="selo"){ const opts=(c.tipo==="selo"?(c.opcoes||[]).map(o=>o.valor):(c.opcoes||[])); return '<div class="field"><label>'+esc(c.nome)+'</label><select id="'+id+'"><option value="">—</option>'+opts.map(o=>'<option '+(o===val?"selected":"")+'>'+esc(o)+'</option>').join("")+'</select></div>'; }
  if(c.tipo==="pessoa"){ const opts=personOptions(); return '<div class="field"><label>'+esc(c.nome)+'</label><select id="'+id+'"><option value="">—</option>'+opts.map(o=>'<option value="'+o.id+'" '+(o.id===val?"selected":"")+'>'+esc(o.label)+'</option>').join("")+'</select></div>'; }
  if(c.tipo==="simnao") return '<div class="field"><label>'+esc(c.nome)+'</label><div class="chk"><input type="checkbox" id="'+id+'" '+(val?"checked":"")+'><span>Sim</span></div></div>';
  const type = c.tipo==="numero"||c.tipo==="moeda"||c.tipo==="porcentagem" ? "number" : c.tipo==="data" ? "date" : c.tipo==="telefone" ? "tel" : c.tipo==="link" ? "url" : "text";
  return '<div class="field"><label>'+esc(c.nome)+'</label><input type="'+type+'" id="'+id+'" value="'+esc(val||"")+'"></div>';
}
function updateCell(modId,regId,colId){ const m=getModule(modId); const reg=m.registros.find(r=>r.id===regId); const col=m.colunas.find(c=>c.id===colId); const tr=document.querySelector('tr[data-reg="'+regId+'"]'); if(!tr)return; const ci=m.colunas.indexOf(col); const td=tr.children[ci]; if(!td)return; const html=cellHTML(col,reg.valores[colId]); if(html===""){td.className="emptyc";td.textContent="—";} else {td.className="";td.innerHTML=html;} }
function addRecord(modId){ const m=getModule(modId); const reg={id:uid(),valores:{}}; m.registros.push(reg); save(); sel={tipo:"record",modId,regId:reg.id}; render(); openRecordPanel(modId,reg.id); toast("Registro adicionado"); }
function recordDel(){ const {modId,regId}=sel; const m=getModule(modId); if(!confirm("Excluir este registro?"))return; m.registros=m.registros.filter(r=>r.id!==regId); save(); closePanel(); toast("Registro excluído"); }

/* ---- coluna ---- */
function openColumnPanel(modId,colId){
  const m=getModule(modId); const col = colId ? m.colunas.find(c=>c.id===colId) : {id:uid(),nome:"",tipo:"texto",opcoes:[]};
  const isNew=!colId; sel=null;
  const optText = (col.tipo==="selo") ? (col.opcoes||[]).map(o=>o.valor).join(", ") : (col.opcoes||[]).join(", ");
  const body=
    fld("Nome da coluna","col_nome",col.nome,"text","Ex.: Convênio")+
    '<div class="field"><label>Tipo</label><select id="col_tipo">'+FIELD_TYPES.map(t=>'<option value="'+t.id+'" '+(t.id===col.tipo?"selected":"")+'>'+t.nome+'</option>').join("")+'</select></div>'+
    '<div class="field" id="col_opcoes_wrap" style="'+((col.tipo==="selecao"||col.tipo==="selo")?"":"display:none")+'"><label>Opções (separadas por vírgula)</label><input type="text" id="col_opcoes" value="'+esc(optText)+'" placeholder="Ativo, Inativo, Pendente"></div>';
  const footer=(isNew?"":'<button class="mbtn del" onclick="deleteColumn(\''+modId+'\',\''+col.id+'\')">🗑 Excluir</button>')+'<button class="mbtn" onclick="saveColumn(\''+modId+'\',\''+col.id+'\','+isNew+')">Salvar coluna</button>';
  openEditModal(isNew?"Nova coluna":"Editar coluna",body,footer);
  document.getElementById("col_tipo").onchange=e=>{ document.getElementById("col_opcoes_wrap").style.display=(e.target.value==="selecao"||e.target.value==="selo")?"":"none"; };
}
function saveColumn(modId,colId,isNew){
  const m=getModule(modId); const nome=document.getElementById("col_nome").value.trim(); const tipo=document.getElementById("col_tipo").value;
  if(!nome){ toast("Dê um nome à coluna."); return; }
  let opcoes=[]; if(tipo==="selecao"||tipo==="selo"){ const raw=(document.getElementById("col_opcoes").value||"").split(",").map(s=>s.trim()).filter(Boolean); opcoes = tipo==="selo" ? raw.map((v,i)=>({valor:v,cor:SELO_CORES[i%SELO_CORES.length]})) : raw; }
  if(isNew){ m.colunas.push({id:colId,nome,tipo,opcoes}); }
  else { const col=m.colunas.find(c=>c.id===colId); col.nome=nome; col.tipo=tipo; col.opcoes=opcoes; }
  save(); render(); closeModal(); toast(isNew?"Coluna criada":"Coluna atualizada");
}
function deleteColumn(modId,colId){ const m=getModule(modId); if(m.colunas.length<=1){ toast("A tabela precisa de ao menos uma coluna."); return; } if(!confirm("Excluir esta coluna e seus valores?"))return; m.colunas=m.colunas.filter(c=>c.id!==colId); m.registros.forEach(r=>delete r.valores[colId]); save(); render(); closeModal(); toast("Coluna excluída"); }

/* ---- helpers de campo ---- */
function fld(label,id,val,type,ph){ return '<div class="field"><label>'+esc(label)+'</label><input type="'+(type||"text")+'" id="'+id+'" value="'+esc(val||"")+'" placeholder="'+esc(ph||"")+'"></div>'; }
function fldArea(label,id,val,ph){ return '<div class="field"><label>'+esc(label)+'</label><textarea id="'+id+'" placeholder="'+esc(ph||"")+'">'+esc(val||"")+'</textarea></div>'; }

/* ============================================================
   MÓDULOS (criar / renomear / excluir)
   ============================================================ */
let novoTipo="tabela";
function novoModulo(){
  if(mode!=="editar") setMode("editar");
  if(view!=="mapa") setView("mapa");
  novoTipo="tabela";
  const body=
    '<div class="field"><label>Nome da área</label><input id="nm_nome" placeholder="Ex.: Convênios, Salas, Agenda…"></div>'+
    '<div class="field"><label>Tipo</label><div class="typepick">'+
      '<button type="button" class="tp on" data-t="tabela" onclick="pickTipo(\'tabela\')"><b>▤ Tabela</b><span>colunas e registros</span></button>'+
      '<button type="button" class="tp" data-t="organograma" onclick="pickTipo(\'organograma\')"><b>◇ Organograma</b><span>árvore hierárquica</span></button>'+
    '</div></div>';
  openEditModal("Nova área no mapa",body,'<button class="mbtn" onclick="criarModulo()">Criar área</button>');
  setTimeout(()=>{ const i=document.getElementById("nm_nome"); if(i)i.focus(); },60);
}
function pickTipo(t){ novoTipo=t; document.querySelectorAll(".tp").forEach(b=>b.classList.toggle("on",b.dataset.t===t)); }
function criarModulo(){
  const nomeIn=document.getElementById("nm_nome"); const nome=(nomeIn&&nomeIn.value.trim())|| (novoTipo==="organograma"?"Novo organograma":"Nova tabela");
  const pos={x:80,y:moduleBottom()+70};
  let m;
  if(novoTipo==="organograma"){ m={id:uid(),tipo:"organograma",nome,pos,raiz:{id:uid(),funcao:"Topo",integrantes:"",unidade:"",registro:"",descricao:"",filhos:[]}}; }
  else { m={id:uid(),tipo:"tabela",nome,pos,colunas:[{id:uid(),nome:"Nome",tipo:"texto",opcoes:[]},{id:uid(),nome:"Status",tipo:"selo",opcoes:[{valor:"Ativo",cor:"verde"},{valor:"Inativo",cor:"vermelho"}]}],registros:[]}; }
  ws.modulos.push(m); save(); closeModal(); render(); focusModule(m.id); toast("Área criada");
}
function focusModule(modId){
  requestAnimationFrame(()=>{
    const el=moduleEl(modId); if(!el)return;
    const st=stage.getBoundingClientRect(), r=el.getBoundingClientRect();
    tx += st.width/2 - (r.left-st.left+r.width/2);
    ty += 96 - (r.top-st.top);
    applyZoom();
    const el2=moduleEl(modId); if(el2){ el2.classList.add("flash-mod"); setTimeout(()=>el2.classList.remove("flash-mod"),1700); }
  });
}
function arrumarMapa(){
  if(view!=="mapa") setView("mapa");
  autolayout(); render();
  const stW=stage.clientWidth; let maxW=0; document.querySelectorAll(".mod").forEach(m=>maxW=Math.max(maxW,m.offsetWidth));
  zoom = maxW>0 ? Math.min(.9, Math.max(.45, (stW-90)/maxW)) : 1;
  tx = stW/2 - (80 + maxW/2)*zoom; ty = 24;
  applyZoom(); toast("Mapa organizado");
}
function renameModule(modId){ const m=getModule(modId); const v=prompt("Nome da área:",m.nome); if(v==null)return; m.nome=v.trim()||m.nome; save(); render(); }
function deleteModule(modId){ const m=getModule(modId); if(ws.modulos.length<=1){ toast("Mantenha ao menos um módulo."); return; } if(!confirm('Excluir o módulo "'+m.nome+'"?'))return; ws.modulos=ws.modulos.filter(x=>x.id!==modId); save(); closePanel(); render(); toast("Módulo excluído"); }

/* ============================================================
   MODO / TÍTULO / IMPORT-EXPORT / PDF
   ============================================================ */
function setMode(m){ if(m==="editar"&&editLocked()){ const p=prompt("Senha de edição:"); if(p!==CLOUD.senha){ if(p!==null)toast("Senha incorreta"); return; } unlocked=true; } mode=m; document.querySelectorAll(".seg-b").forEach(b=>b.classList.toggle("on",b.dataset.mode===m)); if(m==="ver"){ closePanel(); } closeModal(); render(); }
function setView(v){ view=v; if(v!=="mapa") closeModal(); closeModal(); render(); }
document.getElementById("docTitle").addEventListener("input",e=>{ ws.meta.titulo=e.target.value; save(); });

function exportJSON(){ const b=new Blob([JSON.stringify(ws,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=(ws.meta.titulo||"painel").replace(/[^\w\-]+/g,"_")+".json"; a.click(); URL.revokeObjectURL(a.href); toast("Arquivo exportado"); }
function importJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.modulos)throw 0; ws=d; sel=null; save(); render(); closePanel(); toast("Painel importado"); }catch(e){ alert("Arquivo inválido. Use um JSON exportado por este painel."); } }; r.readAsText(f); ev.target.value=""; }
function restaurar(){ if(!confirm("Restaurar o painel padrão? Isso substitui a versão atual (exporte antes se quiser guardar)."))return; ws=defaultWorkspace(); sel=null; render(); autolayout(); render(); closePanel(); toast("Padrão restaurado"); }
function countPeople(){ let n=0; ws.modulos.filter(m=>m.tipo==="organograma").forEach(m=>walk(m.raiz,x=>{ if(x.integrantes)n++; })); return n; }
function buildReport(){
  const rep=document.getElementById("report"); rep.innerHTML="";
  const data=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
  const cover=document.createElement("div"); cover.className="rep-cover";
  cover.innerHTML='<div class="rep-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M6.5 21h11"/><path d="M4 7.5h16"/><path d="M4 7.5l-2.2 4.4a2.6 2.6 0 0 0 5.2 0z"/><path d="M20 7.5l-2.2 4.4a2.6 2.6 0 0 0 5.2 0z"/></svg></div>'+
    '<div class="rep-brand">Grupo Equilibrium</div>'+
    '<div class="rep-sub">Uberlândia/MG — EQ1 Med Center · EQ2 Terapia Infantil</div>'+
    '<div class="rep-title">'+esc(ws.meta.titulo)+'</div>'+
    '<div class="rep-meta">Gerado em '+data+' · '+ws.modulos.length+' módulos · '+countPeople()+' integrantes mapeados</div>';
  rep.appendChild(cover);
  ws.modulos.forEach(m=>{
    const sec=document.createElement("div"); sec.className="rep-section"+(m.tipo==="tabela"?" tbl-sec":"");
    const h=document.createElement("div"); h.className="rep-h"; h.innerHTML=esc(m.nome)+'<span class="rt">'+(m.tipo==="organograma"?"organograma":"tabela")+'</span>';
    sec.appendChild(h);
    if(m.tipo==="organograma"){ const w=document.createElement("div"); w.className="rep-treewrap"; const ul=document.createElement("ul"); ul.className="tree"; ul.appendChild(renderNode(m,m.raiz,0)); w.appendChild(ul); sec.appendChild(w); }
    else { sec.appendChild(renderTableRO(m)); }
    rep.appendChild(sec);
  });
  const uni=renderUnidade();
  if(uni.querySelector(".ucol")){ const sec=document.createElement("div"); sec.className="rep-section"; sec.innerHTML='<div class="rep-h">Distribuição por unidade</div>'; uni.className="units rep-units"; sec.appendChild(uni); rep.appendChild(sec); }
}
function scaleReportTrees(){ document.querySelectorAll(".rep-treewrap").forEach(w=>{ w.style.transform="none"; w.style.height=""; const ul=w.firstElementChild; const cw=ul.scrollWidth, ch=ul.scrollHeight; const s=Math.min(1, 940/cw, 690/ch); w.style.transform="scale("+s+")"; w.style.height=(ch*s)+"px"; }); }
function gerarPDF(){ closePanel(); closeModal(); buildReport(); document.body.classList.add("printing"); scaleReportTrees(); window.print(); document.body.classList.remove("printing"); document.getElementById("report").innerHTML=""; }

/* ---------- toast ---------- */
let toastT; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2000); }

/* ---------- init ---------- */
loadLocal(); render();
if(needsAutolayout){ autolayout(); needsAutolayout=false; render(); }
initCloud();
</script>
</body>
</html>
